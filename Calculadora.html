<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Calculadora Quadrática e Biquadrática</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    input { margin: 5px; padding: 8px; width: 80px; }
    button { padding: 10px 20px; margin-top: 10px; }
    #resultado { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Calculadora de Equações</h2>

<h3>ax² + bx + c = 0</h3>
<input id="a" placeholder="a">
<input id="b" placeholder="b">
<input id="c" placeholder="c"><br>
<button onclick="resolverQuadratica()">Resolver Quadrática</button>

<h3>ax⁴ + bx² + c = 0</h3>
<input id="a2" placeholder="a">
<input id="b2" placeholder="b">
<input id="c2" placeholder="c"><br>
<button onclick="resolverBiquadratica()">Resolver Biquadrática</button>

<div id="resultado"></div>

<script>
function resolverQuadratica() {
  let a = parseFloat(document.getElementById('a').value);
  let b = parseFloat(document.getElementById('b').value);
  let c = parseFloat(document.getElementById('c').value);

  let delta = b*b - 4*a*c;

  if (delta < 0) {
    document.getElementById('resultado').innerText = "Sem raízes reais.";
  } else {
    let x1 = (-b + Math.sqrt(delta)) / (2*a);
    let x2 = (-b - Math.sqrt(delta)) / (2*a);
    document.getElementById('resultado').innerText = `x1 = ${x1}, x2 = ${x2}`;
  }
}

function resolverBiquadratica() {
  let a = parseFloat(document.getElementById('a2').value);
  let b = parseFloat(document.getElementById('b2').value);
  let c = parseFloat(document.getElementById('c2').value);

  let delta = b*b - 4*a*c;

  if (delta < 0) {
    document.getElementById('resultado').innerText = "Sem raízes reais.";
    return;
  }

  let y1 = (-b + Math.sqrt(delta)) / (2*a);
  let y2 = (-b - Math.sqrt(delta)) / (2*a);

  let resultados = [];

  [y1, y2].forEach(y => {
    if (y >= 0) {
      resultados.push(Math.sqrt(y));
      resultados.push(-Math.sqrt(y));
    }
  });

  document.getElementById('resultado').innerText = "Raízes: " + resultados.join(", ");
}
</script>

</body>
</html>
